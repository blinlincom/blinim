name: Build Flutter Android and Web

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Flutter version
        run: flutter --version
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze non-blocking
        run: flutter analyze || true
      - name: Build Web
        run: |
          flutter build web --release --base-href /
          perl -0pi -e 's|<base href="/">|<base href="./">|' build/web/index.html

      - name: Configure Android signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
            cat > android/key.properties <<EOF
          storeFile=app/upload-keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF
            echo "Using Android signing key from GitHub Secrets."
          else
            echo "Using repository CI signing key android/app/ci-release.jks."
          fi
      - name: Build Android APK
        run: flutter build apk --release --no-tree-shake-icons
      - name: Upload APK
        if: always() && hashFiles('build/app/outputs/flutter-apk/app-release.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: imblinlin-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
      - name: Upload Web
        if: always() && hashFiles('build/web/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: imblinlin-web
          path: build/web
